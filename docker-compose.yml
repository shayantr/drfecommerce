services:
  db:
    image: postgres:18-alpine
    container_name: 'postgres_db'
    environment:
      POSTGRES_USER: 'admin'
      POSTGRES_PASSWORD: 'mysecurepassword'
      POSTGRES_DB: 'my_database'
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql

  minio:
    image: minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
      - MINIO_DEFAULT_BUCKETS=buck1
    networks:
      mynet:
        aliases:
          - my-localhost  # Alias for localhost access
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
  mc:
    image: minio/mc
    container_name: minio_mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9001 admin password123;
      mc mb myminio/ecommerce;
      mc anonymous set public myminio/ecommerce;
      tail -f /dev/null;
      "

networks:
  mynet:
    driver: bridge
volumes:
  minio_data:
    driver: local